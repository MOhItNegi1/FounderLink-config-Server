server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        # ===== BUSINESS ROUTES =====
        - id: auth-service-route
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: user-service-route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=1

        - id: startup-service-route
          uri: lb://STARTUP-SERVICE
          predicates:
            - Path=/startups/**
          filters:
            - StripPrefix=1

        - id: investment-service-route
          uri: lb://INVESTMENT-SERVICE
          predicates:
            - Path=/investments/**
          filters:
            - StripPrefix=1

        # ===== AGGREGATED SWAGGER — api-docs proxy routes =====
        # Gateway proxies each service's /v3/api-docs so the
        # aggregated Swagger UI at :8080/swagger-ui.html can load them.
        - id: auth-service-apidocs
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/v3/api-docs
          filters:
            - StripPrefix=1

        - id: user-service-apidocs
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/v3/api-docs
          filters:
            - StripPrefix=1

        - id: startup-service-apidocs
          uri: lb://STARTUP-SERVICE
          predicates:
            - Path=/startups/v3/api-docs
          filters:
            - StripPrefix=1

        - id: investment-service-apidocs
          uri: lb://INVESTMENT-SERVICE
          predicates:
            - Path=/investments/v3/api-docs
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: founderlink-super-secret-key-2024-minimum-32chars

# ===== AGGREGATED SWAGGER UI =====
# Visit: http://localhost:8080/swagger-ui.html
# Use the dropdown (top-right) to switch between services.
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: User Service
        url: /users/v3/api-docs
      - name: Startup Service
        url: /startups/v3/api-docs
      - name: Investment Service
        url: /investments/v3/api-docs
  api-docs:
    enabled: true

# ===== ZIPKIN DISTRIBUTED TRACING =====
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
